<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — Ledgr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="app-shell">

    <div th:replace="~{fragments/sidebar :: sidebar('analytics')}"></div>

    <div class="main-area">

        <div class="page-head">
            <div>
                <h1>Analytics</h1>
                <p>the bigger picture, not just this month.</p>
            </div>
        </div>

        <div class="summary-grid" style="grid-template-columns: repeat(4, 1fr);">
            <div class="summary-card">
                <div class="lbl">Total income</div>
                <div class="val positive" th:text="'₹' + ${#numbers.formatDecimal(totalIncome, 1, 'COMMA', 2, 'POINT')}"></div>
            </div>
            <div class="summary-card">
                <div class="lbl">Total expenses</div>
                <div class="val negative" th:text="'₹' + ${#numbers.formatDecimal(totalExpense, 1, 'COMMA', 2, 'POINT')}"></div>
            </div>
            <div class="summary-card">
                <div class="lbl">Largest expense category</div>
                <div class="val" style="font-size:1.1rem;" th:text="${largestCategory != null ? largestCategory : 'not enough data'}"></div>
            </div>
            <div class="summary-card">
                <div class="lbl">Highest spending month</div>
                <div class="val" style="font-size:1.1rem;" th:text="${highestMonth != null ? highestMonth : 'not enough data'}"></div>
            </div>
        </div>

        <div class="grid-2">
            <div class="panel">
                <h2>Income vs expense, last 6 months</h2>
                <canvas id="trendChart" height="140"></canvas>
            </div>
            <div class="panel">
                <h2>Spending by category</h2>
                <div th:if="${!hasCategoryData}" class="empty-state">
                    No expenses logged yet.
                </div>
                <canvas th:unless="${!hasCategoryData}" id="categoryChart" height="220"></canvas>
            </div>
        </div>

    </div>
</div>

<script th:inline="javascript">
    const trendLabels = /*[[${trendLabels}]]*/ [];
    const trendIncome = /*[[${trendIncome}]]*/ [];
    const trendExpense = /*[[${trendExpense}]]*/ [];

    new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
            labels: trendLabels,
            datasets: [
                {
                    label: 'Income',
                    data: trendIncome,
                    borderColor: '#0f9d63',
                    backgroundColor: 'rgba(15,157,99,0.08)',
                    fill: true,
                    tension: 0.35
                },
                {
                    label: 'Expense',
                    data: trendExpense,
                    borderColor: '#d1453b',
                    backgroundColor: 'rgba(209,69,59,0.06)',
                    fill: true,
                    tension: 0.35
                }
            ]
        },
        options: {
            plugins: { legend: { position: 'bottom' } },
            scales: { y: { beginAtZero: true } }
        }
    });

    const hasCategoryData = /*[[${hasCategoryData}]]*/ false;

    if (hasCategoryData) {
        const categoryLabels = /*[[${categoryLabels}]]*/ [];
        const categoryValues = /*[[${categoryValues}]]*/ [];

        new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: {
                labels: categoryLabels,
                datasets: [{
                    data: categoryValues,
                    backgroundColor: ['#0f9d63','#5c6663','#d1453b','#e3f6ec','#14181a','#0b7a4d','#8fb8a8','#c9a15a','#7a8b99','#b98484'],
                    borderWidth: 0
                }]
            },
            options: {
                plugins: { legend: { position: 'bottom' } },
                cutout: '65%'
            }
        });
    }
</script>

</body>
</html>
