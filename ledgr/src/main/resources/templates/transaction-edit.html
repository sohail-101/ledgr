<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit transaction — Ledgr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-shell">

    <div th:replace="~{fragments/sidebar :: sidebar('transactions')}"></div>

    <div class="main-area">

        <div class="page-head">
            <div>
                <h1>Edit transaction</h1>
                <p>make your changes and save.</p>
            </div>
        </div>

        <div class="panel" style="max-width:520px;">
            <form th:action="@{/transactions/{id}(id=${txId})}" th:object="${txForm}" method="post" novalidate>

                <div class="field-group">
                    <label>Amount</label>
                    <input type="number" step="0.01" th:field="*{amount}">
                    <div class="field-error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
                </div>

                <div class="field-group">
                    <label>Type</label>
                    <select th:field="*{type}">
                        <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>

                <div class="field-group">
                    <label>Category</label>
                    <select th:field="*{category}">
                        <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
                    </select>
                </div>

                <div class="field-group">
                    <label>Date</label>
                    <input type="date" th:field="*{date}">
                </div>

                <div class="field-group">
                    <label>Description</label>
                    <input type="text" th:field="*{description}">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-ledgr btn-green">Save changes</button>
                    <a th:href="@{/transactions}" class="btn-ledgr btn-outline">Cancel</a>
                </div>
            </form>
        </div>

    </div>
</div>

</body>
</html>
