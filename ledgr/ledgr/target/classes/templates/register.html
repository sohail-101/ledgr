<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account — Ledgr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-shell">
    <div class="auth-card">
        <h1>Create your account</h1>
        <p class="auth-sub">------------</p>

        <form th:action="@{/register}" th:object="${registerForm}" method="post" novalidate>

            <div class="field-group">
                <label for="name">Full name</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Sohail Ahmed" autocomplete="name">
                <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="field-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" placeholder="you@example.com" autocomplete="email">
                <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="field-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" placeholder="At least 6 characters" autocomplete="new-password">
                <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="field-group">
                <label for="confirmPassword">Confirm password</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Type it again" autocomplete="new-password">
                <div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit" class="btn-ledgr btn-green btn-block-ledgr">Create account</button>
        </form>

        <p class="auth-switch">Already have an account? <a th:href="@{/login}">Log in</a></p>
    </div>
</div>

</body>
</html>
